# This version is not needed in new docker-compose.yaml files
#version: '3.1'

services:
  db:
    image: postgres:latest
    container_name: database-db-1
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      TZ: Asia/Kolkata
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: